
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomodachiMobile.Com - Official Website | Download Mobile & PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;900&amp;display=swap" rel="stylesheet">
    <style>
        :root { 
            --tl-brown: #644B2D; 
            --tl-accent: #ffd166;
            --tl-gold: #ce9d4d;
        }
        
        body { 
            background: linear-gradient(180deg, #7a5d3a 0%, var(--tl-brown) 100%);
            font-family: 'Lexend', sans-serif; 
            color: white; 
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        .header-section { 
            width: 100%; 
            padding: 45px 0 25px 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
        }

        /* LOGO POP ANIMATION */
        .main-logo {
            width: 130px;
            height: 130px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 18px;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: white;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .logo-active { 
            transform: scale(1.15) rotate(-3deg); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 20px rgba(255,209,102,0.3);
            border: 4px solid white;
        }

        .slider-container {
            max-width: 440px;
            margin: 0 auto 30px auto;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
            position: relative;
        }
        #slides-track { display: flex; transition: transform 0.9s cubic-bezier(0.65, 0, 0.35, 1); }
        .slide-item { flex: 0 0 100%; width: 100%; aspect-ratio: 16/9; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }

        .selection-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--tl-accent);
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* PREMIUM BUTTONS */
        .version-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 310px;
            margin: 0 auto 30px auto;
        }
        .version-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 24px;
            border-radius: 18px;
            text-align: center; /* Centered text for cleaner look */
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .version-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        /* ACTIVE STATE: Clean Gold-White Highlight */
        .version-btn.active {
            background: white;
            color: var(--tl-brown);
            border-color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .download-btn {
            background: white;
            color: var(--tl-brown);
            width: 100%;
            max-width: 310px;
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            display: block;
            margin: 0 auto;
            transition: all 0.2s ease;
        }
        .download-btn:active { transform: translateY(3px) scale(0.98); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* LOADING OVERLAY REFINED */
        #install-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--tl-brown);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .loading-logo {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            margin-bottom: 35px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            animation: install-pulse 2s infinite ease-in-out;
        }
        @keyframes install-pulse {
            0%, 100% { transform: scale(0.96); filter: brightness(0.9); }
            50% { transform: scale(1.04); filter: brightness(1.15); box-shadow: 0 0 60px rgba(255,255,255,0.1); }
        }

        .progress-container {
            width: 100%;
            max-width: 250px;
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: white;
            transition: width 0.5s ease;
            box-shadow: 0 0 15px white;
        }
        
        .status-text { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .log-text { font-family: monospace; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

        .fade-out { opacity: 0; transform: scale(0.95); pointer-events: none; transition: 0.6s; }
    </style>

</head>
<body>

    <div id="main-content" class="px-5 transition-all duration-700">
        <header class="header-section">
            <img id="top-logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b4/TomodachiLifeBoxartNA.jpg/250px-TomodachiLifeBoxartNA.jpg" alt="Logo" class="main-logo">
            <h1 class="text-3xl font-black uppercase tracking-tighter mb-1">Tomodachi Life</h1>
            <p class="selection-label">Select Device</p>
        </header>

        <main class="max-w-md mx-auto">
            <div class="slider-container">
                <div id="slides-track">
                    <div class="slide-item"><img src="img/5994451268115565882_121.jpg"></div>
                    <div class="slide-item"><img src="img/Image-from-iOS-2.jpg"></div>
                </div>
            </div>

            <div class="version-list">
                <button onclick="selectVer('android')" id="btn-android" class="version-btn">Android</button>
            </div>

            <button onclick="startInstall()" class="download-btn">Download Now</button>
            <p id="error-msg" class="text-center text-[10px] mt-4 font-bold text-orange-300 h-4 uppercase tracking-[2px]"></p>
        </main>

        <footer class="mt-20 pb-10 text-center opacity-20 text-[9px] font-bold uppercase tracking-[4px]">
            © 2026 Port Project
        </footer>
    </div>

    <div id="install-overlay">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b4/TomodachiLifeBoxartNA.jpg/250px-TomodachiLifeBoxartNA.jpg" class="loading-logo">
        <h2 id="status-title" class="status-text">Connecting...</h2>
        <div class="progress-container">
            <div id="progress-bar" class="progress-fill"></div>
        </div>
        <div id="status-log" class="log-text">> Syncing asset cache</div>
    </div>

    <script>
        const LINKS = {
            android: "https://gamelnk.site/cl/i/o4er7n",
        };

        let selected = null;
        let slideIdx = 0;

        function moveSlide() {
            slideIdx = (slideIdx + 1) % 2;
            const track = document.getElementById('slides-track');
            if(track) track.style.transform = `translateX(-${slideIdx * 100}%)`;
        }
        setInterval(moveSlide, 4500);

        function selectVer(id) {
            selected = id;
            document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            
            const logo = document.getElementById('top-logo');
            logo.classList.add('logo-active');
            
            document.getElementById('error-msg').textContent = "";
        }

        function startInstall() {
            if (!selected) {
                document.getElementById('error-msg').textContent = "Pick a device version";
                return;
            }

            document.getElementById('main-content').classList.add('fade-out');
            const overlay = document.getElementById('install-overlay');
            const bar = document.getElementById('progress-bar');
            const log = document.getElementById('status-log');
            const title = document.getElementById('status-title');

            setTimeout(() => {
                overlay.style.display = 'flex';
                setTimeout(() => overlay.style.opacity = '1', 50);

                const steps = [
                    { p: "30%", t: "> Securing cloud link...", l: "Connecting" },
                    { p: "65%", t: "> Initializing handshake...", l: "Synchronizing" },
                    { p: "100%", t: "> Redirecting to mirror...", l: "Success" }
                ];

                steps.forEach((s, i) => {
                    setTimeout(() => { 
                        bar.style.width = s.p; 
                        log.textContent = s.t; 
                        title.textContent = s.l;
                        if(i === 2) setTimeout(() => window.location.href = LINKS[selected], 1000);
                    }, (i + 1) * 1300);
                });
            }, 600);
        }
    </script>

</body>
</html>
